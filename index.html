<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>ARTA</title>
</head>
<body>
    <div class="container">
        <form>
            <h1 class="title">ARTA</h1>
            <h3 class="subtitle">Acesse sua conta</h3>
            <p>Informe seu login e senha para entrar no sistema</p>

            <div>
                <input placeholder="Email" type="email" required>
                <img width="20" height="20" src="https://img.icons8.com/ios-filled/50/user.png" alt="user"/>
            </div>

            <div>
                <input placeholder="Senha" type="password" required>
                <img width="20" height="20" src="https://img.icons8.com/ios-glyphs/30/lock--v1.png" alt="lock--v1"/>
                <a href="#">Esqueci minha senha</a>
            </div>
            
            <button type="submit">Entrar</button>

            <div>
                <p>Não está cadastrado ? <a href="#">Cadastrar</a></p>
            </div>
        </form>
    </div>
</body>
</html>
